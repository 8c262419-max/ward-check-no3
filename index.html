    /* 自訂美化 Checkbox 樣式 */
    .checkbox-container {
      display: flex;
      align-items: center;
      background: #FFFFFF;
      border: 2px solid #E4DEFF;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 8px rgba(124,92,191,0.06);
      transition: all 0.15s ease;
    }
    .checkbox-container:active {
      transform: scale(0.99);
    }
    .checkbox-input {
      display: none;
    }
    .checkbox-custom {
      width: 26px;
      height: 26px;
      border: 2px solid #7C5CBF;
      border-radius: 6px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      background: #fff;
      flex-shrink: 0;
    }
    .checkbox-input:checked + .checkbox-custom {
      background: #51CF66;
      border-color: #51CF66;
    }
    .checkbox-custom::after {
      content: "✓";
      color: white;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
    .checkbox-input:checked + .checkbox-custom::after {
      display: block;
    }
    .checkbox-label {
      font-size: 16px;
      font-weight: 700;
      color: #2D2A4A;
      flex: 1;
    }
    .checkbox-status {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: #FFF0F0;
      color: #FF6B6B;
      border: 1px solid rgba(255,107,107,0.3);
    }
    .checkbox-input:checked ~ .checkbox-status {
      background: #EBFBEE;
      color: #51CF66;
      border-color: rgba(81,207,102,0.3);
    }
  </style>
